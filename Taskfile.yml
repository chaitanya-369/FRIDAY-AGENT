version: '3'

tasks:
  dev:
    desc: "Run the full FRIDAY meta-development stack"
    cmds:
      - task: backend
      - task: frontend

  full:
    desc: "Run all FRIDAY services (backend + frontend + Slack bot)"
    cmds:
      - task: backend
      - task: frontend
      - task: slack

  slack:
    desc: "Start the FRIDAY Slack Socket Mode bot"
    cmds:
      - ./venv/Scripts/python -m friday.interfaces.slack_bot

  backend:
    desc: "Start the FastAPI backend"
    cmds:
      - ./venv/Scripts/python -m uvicorn friday.api.server:app --reload

  frontend:
    desc: "Start the React/Vite dashboard"
    dir: frontend
    cmds:
      - bun dev

  update-graph:
    desc: "Update the Graphify code visualization"
    cmds:
      - graphify update .
